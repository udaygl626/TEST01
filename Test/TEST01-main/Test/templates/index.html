<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Flask Demo</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f8;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,0.15);
            text-align:center;
            width:450px;
        }

        h1{
            color:#2c3e50;
            margin-bottom:15px;
        }

        p{
            color:#555;
            margin-bottom:20px;
        }

        .status{
            display:inline-block;
            background:#28a745;
            color:white;
            padding:10px 18px;
            border-radius:20px;
            font-weight:bold;
        }

        button{
            margin-top:25px;
            padding:10px 20px;
            border:none;
            background:#007bff;
            color:white;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Flask Frontend Running on Docker</h1>
    <p>If you're seeing this page, your Flask container has launched successfully.</p>

    <div class="status">
        Container Status: Running
    </div>

    <br>

    <button onclick="alert('Hello from Flask running inside Docker!')">
        Test Frontend
    </button>
</div>

</body>
</html>
